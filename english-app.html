<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emma's English Lab</title>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f2f0eb;
    --border: #e2dfd8;
    --primary: #6b8f71;
    --primary-light: #e8f0e9;
    --primary-dark: #4a6b50;
    --accent: #c9956e;
    --text: #2d2d2d;
    --text-muted: #7a7672;
    --emma-bg: #eef4ef;
    --user-bg: #fff8f4;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  .logo {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--primary-dark);
    white-space: nowrap;
    flex: 1;
  }
  .logo span { color: var(--accent); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.ok { background: var(--primary); }
  .status-dot.error { background: #e57373; }


  .settings-btn {
    width: 56px; height: 56px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .settings-btn:hover { border-color: var(--primary); background: var(--primary-light); }
  .settings-btn.active { border-color: var(--primary); background: var(--primary-light); }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 200px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sidebar-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px;
    border-radius: 10px;
    transition: background 0.2s;
  }
  .step-item.active { background: var(--primary-light); }
  .step-item.done .step-num { background: var(--primary); color: #fff; border-color: var(--primary); }
  .step-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .step-item.active .step-num {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
    box-shadow: 0 0 0 3px var(--primary-light);
  }
  .step-label { font-size: 0.82rem; line-height: 1.4; color: var(--text); }
  .step-item.active .step-label { font-weight: 600; color: var(--primary-dark); }
  .step-item.done .step-label { color: var(--text-muted); }
  .step-connector { width: 1.5px; height: 12px; background: var(--border); margin-left: 28px; }
  .step-connector.done-line { background: var(--primary); }
  .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
  .restart-btn {
    width: 100%;
    padding: 8px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .restart-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Message bubbles ── */
  .msg {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.emma { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }
  .avatar.emma-av { background: var(--primary); overflow: hidden; padding: 0; }
  .avatar.emma-av img { width: 100%; height: 100%; object-fit: cover; object-position: top; border-radius: 50%; display: block; }
  .avatar.user-av { background: var(--accent); }
  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.65;
    font-size: 0.9rem;
    box-shadow: var(--shadow);
  }
  .emma .bubble { background: var(--emma-bg); border-bottom-left-radius: 4px; color: var(--text); }
  .user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; color: var(--text); border: 1px solid var(--border); }
  .bubble strong { color: var(--primary-dark); }
  .bubble b { color: var(--primary-dark); font-weight: 700; }
  .bubble .ja { color: var(--text-muted); font-size: 0.82rem; margin-top: 2px; }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .bubble .word-header {
    font-weight: 700; color: var(--primary-dark); font-size: 0.95rem;
    margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1.5px solid var(--primary-light);
  }
  .bubble ol { padding-left: 18px; }
  .bubble ol li { margin-bottom: 6px; }

  .typing-indicator {
    display: flex; gap: 4px; padding: 12px 16px;
    background: var(--emma-bg); border-radius: 18px; border-bottom-left-radius: 4px;
    width: fit-content; box-shadow: var(--shadow);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Input panels ── */
  .input-panel { background: var(--surface); border-top: 1px solid var(--border); padding: 16px 24px; flex-shrink: 0; }
  .step1-panel { display: flex; flex-direction: column; gap: 12px; }
  .field-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
  .field-group label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); }
  .field-group input, .field-group select {
    padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 0.88rem; font-family: inherit; background: var(--surface2); color: var(--text); outline: none; transition: border-color 0.2s;
  }
  .field-group input:focus, .field-group select:focus { border-color: var(--primary); }
  .checkbox-group {
    display: flex; align-items: center; gap: 8px; padding: 9px 12px;
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px;
    cursor: pointer; user-select: none; transition: border-color 0.2s;
  }
  .checkbox-group:hover { border-color: var(--primary); }
  .checkbox-group input[type="checkbox"] { accent-color: var(--primary); width: 15px; height: 15px; cursor: pointer; }
  .checkbox-group span { font-size: 0.85rem; color: var(--text); }
  .generate-btn {
    padding: 10px 28px; background: var(--primary); color: #fff; border: none; border-radius: 10px;
    font-size: 0.9rem; font-family: inherit; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
  }
  .generate-btn:hover { background: var(--primary-dark); }
  .generate-btn:active { transform: scale(0.97); }
  .generate-btn:disabled { background: #bbb; cursor: not-allowed; }
  .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
  .chat-input-row textarea {
    flex: 1; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 0.9rem; font-family: inherit; resize: none; background: var(--surface2); color: var(--text);
    outline: none; min-height: 44px; max-height: 120px; transition: border-color 0.2s; line-height: 1.5;
  }
  .chat-input-row textarea:focus { border-color: var(--primary); }
  .send-btn {
    padding: 11px 18px; background: var(--primary); color: #fff; border: none; border-radius: 12px;
    font-size: 0.9rem; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--primary-dark); }
  .send-btn:disabled { background: #bbb; cursor: not-allowed; }
  .input-hint { font-size: 0.76rem; color: var(--text-muted); margin-bottom: 6px; }
  .step-action-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .next-btn {
    padding: 8px 20px; background: none; border: 1.5px solid var(--primary); color: var(--primary-dark);
    border-radius: 10px; font-size: 0.82rem; font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .next-btn:hover { background: var(--primary-light); }

  /* ── Settings Drawer ── */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .settings-overlay.open { opacity: 1; pointer-events: all; }

  .settings-drawer {
    position: fixed;
    top: 0; right: 0;
    width: 320px;
    height: 100vh;
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    z-index: 101;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto;
  }
  .settings-drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .drawer-title { font-size: 1rem; font-weight: 700; color: var(--primary-dark); }
  .drawer-close {
    width: 30px; height: 30px;
    border-radius: 8px; border: none; background: var(--surface2);
    cursor: pointer; font-size: 1rem; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .drawer-close:hover { background: var(--border); }

  .drawer-body { padding: 20px; display: flex; flex-direction: column; gap: 24px; }

  .drawer-section { display: flex; flex-direction: column; gap: 10px; }
  .drawer-section-title {
    font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  .drawer-input-row { display: flex; gap: 8px; }
  .drawer-input {
    flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 0.85rem; font-family: inherit; background: var(--surface2); color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .drawer-input:focus { border-color: var(--primary); }
  .drawer-save-btn {
    padding: 9px 16px; background: var(--primary); color: #fff; border: none; border-radius: 10px;
    font-size: 0.82rem; font-family: inherit; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: background 0.2s;
  }
  .drawer-save-btn:hover { background: var(--primary-dark); }

  .api-key-note { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; }
  .api-key-note a { color: var(--primary-dark); }


  .console-link {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--primary-dark);
    text-decoration: none;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid var(--primary);
    background: var(--surface);
    transition: background 0.2s;
    justify-content: center;
  }
  .console-link:hover { background: var(--primary-light); }

  .connection-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 0.82rem;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .connection-status .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; animation: none; }
  .connection-status.ok .dot { background: var(--primary); }
  .connection-status.error .dot { background: #e57373; }
  .connection-status .msg-text { color: var(--text-muted); }
  .connection-status.ok .msg-text { color: var(--primary-dark); }
  .connection-status.error .msg-text { color: #b85c5c; }

  /* ── Session buttons ── */
  .sidebar-footer { display: flex; flex-direction: column; gap: 6px; }
  .save-session-btn {
    width: 100%; padding: 8px; background: var(--primary); border: none;
    border-radius: 8px; font-size: 0.8rem; font-family: inherit; font-weight: 600;
    color: #fff; cursor: pointer; transition: background 0.2s;
  }
  .save-session-btn:hover { background: var(--primary-dark); }
  .save-session-btn:disabled { background: #bbb; cursor: not-allowed; }
  .history-btn {
    width: 100%; padding: 8px; background: none; border: 1.5px solid var(--primary);
    border-radius: 8px; font-size: 0.8rem; font-family: inherit; font-weight: 600;
    color: var(--primary-dark); cursor: pointer; transition: all 0.2s;
  }
  .history-btn:hover { background: var(--primary-light); }

  /* ── Modal base ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-box {
    background: var(--surface); border-radius: 20px; box-shadow: var(--shadow-lg);
    width: 440px; max-width: 95vw; max-height: 85vh;
    display: flex; flex-direction: column; overflow: hidden;
    transform: translateY(10px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal-box { transform: translateY(0); }
  .modal-header {
    padding: 20px 20px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .modal-title { font-size: 1rem; font-weight: 700; color: var(--primary-dark); }
  .modal-close {
    width: 30px; height: 30px; border-radius: 8px; border: none;
    background: var(--surface2); cursor: pointer; font-size: 1rem;
    color: var(--text-muted); display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

  /* ── Resume modal ── */
  .resume-card {
    background: var(--primary-light); border: 1.5px solid var(--primary);
    border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 6px;
  }
  .resume-words { font-size: 1rem; font-weight: 700; color: var(--primary-dark); }
  .resume-meta { font-size: 0.78rem; color: var(--text-muted); }
  .resume-btn-row { display: flex; gap: 10px; margin-top: 4px; }
  .resume-btn {
    flex: 1; padding: 10px; background: var(--primary); color: #fff; border: none;
    border-radius: 10px; font-size: 0.88rem; font-family: inherit; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .resume-btn:hover { background: var(--primary-dark); }
  .resume-new-btn {
    flex: 1; padding: 10px; background: none; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 0.88rem; font-family: inherit; font-weight: 600;
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  }
  .resume-new-btn:hover { border-color: var(--accent); color: var(--accent); }
  .resume-hist-link {
    text-align: center; font-size: 0.78rem; color: var(--primary-dark);
    cursor: pointer; text-decoration: underline; margin-top: 2px;
  }

  /* ── History list ── */
  .session-item {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 14px 12px;
    display: flex; flex-direction: column; gap: 6px; transition: border-color 0.2s;
  }
  .session-item:hover { border-color: var(--primary); }
  .session-words { font-size: 0.9rem; font-weight: 700; color: var(--text); }
  .session-meta { font-size: 0.75rem; color: var(--text-muted); }
  .session-btn-row { display: flex; gap: 8px; margin-top: 2px; }
  .session-resume-btn {
    padding: 6px 16px; background: var(--primary); color: #fff; border: none;
    border-radius: 8px; font-size: 0.8rem; font-family: inherit; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .session-resume-btn:hover { background: var(--primary-dark); }
  .session-del-btn {
    padding: 6px 12px; background: none; border: 1px solid var(--border);
    border-radius: 8px; font-size: 0.8rem; font-family: inherit;
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  }
  .session-del-btn:hover { border-color: #e57373; color: #e57373; }
  .history-empty { text-align: center; color: var(--text-muted); font-size: 0.88rem; padding: 20px 0; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--primary-dark); color: #fff; padding: 10px 20px;
    border-radius: 24px; font-size: 0.85rem; font-weight: 600;
    opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 300; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .chat-messages { padding: 16px; }
    .input-panel { padding: 12px 16px; }
    .field-row { flex-direction: column; }
    .settings-drawer { width: 100%; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">Emma's <span>English</span> Lab</div>
  <div class="header-status">
<div class="status-dot" id="statusDot"></div>
    <span id="statusText" style="font-size:0.75rem;color:var(--text-muted)">未接続</span>
  </div>
  <button class="settings-btn" id="settingsBtn" onclick="toggleSettings()" title="設定">⚙️</button>
</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>

<!-- Resume modal (shown on page load if sessions exist) -->
<div class="modal-overlay" id="resumeModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">📚 前回のセッションを再開しますか？</div>
    </div>
    <div class="modal-body">
      <div class="resume-card">
        <div class="resume-words" id="resumeWords"></div>
        <div class="resume-meta" id="resumeMeta"></div>
      </div>
      <div class="resume-btn-row">
        <button class="resume-btn" onclick="resumeLatestSession()">再開する</button>
        <button class="resume-new-btn" onclick="closeResumeModal()">新規開始</button>
      </div>
      <div class="resume-hist-link" onclick="closeResumeModal(); openHistoryModal()">過去のセッションを見る →</div>
    </div>
  </div>
</div>

<!-- History modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">📋 保存済みセッション</div>
      <button class="modal-close" onclick="closeHistoryModal()">✕</button>
    </div>
    <div class="modal-body" id="historyList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Settings drawer -->
<div class="settings-drawer" id="settingsDrawer">
  <div class="drawer-header">
    <div class="drawer-title">⚙️ 設定</div>
    <button class="drawer-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="drawer-body">

    <!-- API Key section -->
    <div class="drawer-section">
      <div class="drawer-section-title">API キー</div>
      <div class="drawer-input-row">
        <input type="password" class="drawer-input" id="apiKeyInput" placeholder="sk-ant-..." oninput="onApiKeyInput()">
        <button class="drawer-save-btn" onclick="saveApiKey()">保存</button>
      </div>
      <div class="api-key-note">

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let apiKey = '';
let currentStep = 1;
let learnedWords = [];
let theme = '';
let useAdverb = false;
let conversationHistory = [];
let chatLog = []; // {role, html} pairs for visual restore
let isLoading = false;

// ─── Init ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  const saved = localStorage.getItem('emma_api_key');
  if (saved) {
    apiKey = saved;
    document.getElementById('apiKeyInput').value = saved;
    updateConnectionStatus(saved.startsWith('sk-ant-') ? 'ok' : 'idle');
  }
  checkForSavedSessions();
};

// ─── Settings Drawer ─────────────────────────────────────────────────────────
function toggleSettings() {
  const drawer = document.getElementById('settingsDrawer');
  if (drawer.classList.contains('open')) closeSettings();
  else openSettings();
}
function openSettings() {
  document.getElementById('settingsDrawer').classList.add('open');
  document.getElementById('settingsOverlay').classList.add('open');
  document.getElementById('settingsBtn').classList.add('active');
}
function closeSettings() {
  document.getElementById('settingsDrawer').classList.remove('open');
  document.getElementById('settingsOverlay').classList.remove('open');
  document.getElementById('settingsBtn').classList.remove('active');
}

// ─── API Key ──────────────────────────────────────────────────────────────────
function onApiKeyInput() {
  const val = document.getElementById('apiKeyInput').value.trim();
  updateConnectionStatus(val.startsWith('sk-ant-') ? 'ok' : 'idle');
}

function saveApiKey() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('emma_api_key', apiKey);
  if (apiKey.startsWith('sk-ant-')) {
    updateConnectionStatus('ok');
  } else {
    updateConnectionStatus('idle');
  }
}

function updateConnectionStatus(state) {
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const connEl = document.getElementById('connectionStatus');
  const connText = document.getElementById('connectionText');
  if (state === 'ok') {
    statusDot.className = 'status-dot ok';
    statusText.textContent = '接続済み';
    connEl.className = 'connection-status ok';
    connText.textContent = 'APIキーが設定されています';
  } else if (state === 'error') {
    statusDot.className = 'status-dot error';
    statusText.textContent = 'エラー';
    connEl.className = 'connection-status error';
    connText.textContent = 'APIキーが無効です';
  } else {
    statusDot.className = 'status-dot';
    statusText.textContent = '未接続';
    connEl.className = 'connection-status';
    connText.textContent = 'APIキーを入力して保存してください';
  }
}


// ─── Step navigation ──────────────────────────────────────────────────────────
function setStep(n) {
  currentStep = n;
  [1,2,3,4].forEach(i => {
    const el = document.getElementById('sideStep' + i);
    el.className = 'step-item' + (i === n ? ' active' : i < n ? ' done' : '');
    const conn = document.getElementById('conn' + i);
    if (conn) conn.className = 'step-connector' + (i < n ? ' done-line' : '');
  });
  document.getElementById('step1Panel').style.display = n === 1 ? 'block' : 'none';
  document.getElementById('step2Panel').style.display = n === 2 ? 'block' : 'none';
  document.getElementById('step3Panel').style.display = n === 3 ? 'block' : 'none';
}
function goToStep2() { setStep(2); }
function goToStep3() { setStep(3); }

// ─── Message helpers ──────────────────────────────────────────────────────────
function addEmmaMessage(html, skipLog = false) {
  appendMsg(createMsg('emma', html));
  if (!skipLog) chatLog.push({ role: 'emma', html });
}
function addUserMessage(text, skipLog = false) {
  const html = escapeHtml(text);
  appendMsg(createMsg('user', html));
  if (!skipLog) chatLog.push({ role: 'user', html });
}

function createMsg(role, html) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'emma' ? 'emma-av' : 'user-av');
  if (role === 'emma') { av.innerHTML = '<img src="emma1.jpg" alt="Emma">'; } else { av.textContent = '🙋'; }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  return wrap;
}
function appendMsg(el) {
  const c = document.getElementById('chatMessages');
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
}
function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

let typingEl = null;
function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg emma';
  wrap.id = 'typingMsg';
  const av = document.createElement('div');
  av.className = 'avatar emma-av';
  av.innerHTML = '<img src="emma1.jpg" alt="Emma">';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrap.appendChild(av);
  wrap.appendChild(ind);
  appendMsg(wrap);
  typingEl = wrap;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ─── Claude API ───────────────────────────────────────────────────────────────
async function callClaude(messages, systemPrompt, maxTokens = 2000) {
  if (!apiKey) {
    addEmmaMessage('⚠️ APIキーが設定されていません。右上の ⚙️ から設定してください。');
    return null;
  }
  const payload = {
    model: 'claude-haiku-4-5-20251001',
    max_tokens: maxTokens,
    system: systemPrompt,
    messages: messages
  };
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(payload)
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    if (resp.status === 401) updateConnectionStatus('error');
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  return (await resp.json()).content[0].text;
}

// ─── Step 1 ───────────────────────────────────────────────────────────────────
async function startGeneration() {
  if (isLoading) return;
  const rawWords = document.getElementById('wordsInput').value.trim();
  if (!rawWords) { addEmmaMessage('学びたい単語を入力してください。'); return; }
  if (!apiKey) { addEmmaMessage('⚠️ まず右上の ⚙️ からAPIキーを設定してください。'); openSettings(); return; }

  learnedWords = rawWords.split(/[\/,、，\s]+/).map(w => w.trim()).filter(Boolean);
  theme = document.getElementById('themeInput').value.trim();
  useAdverb = document.getElementById('adverbCheck').checked;

  const wordStr = learnedWords.join(' / ');
  const themeStr = theme ? `テーマ：${theme}` : 'テーマ：なし（一般的な場面）';
  const adverbStr = useAdverb ? '副詞を必ず1つ含めてください。' : '副詞は不要です。';

  addUserMessage(`単語：${wordStr}\n${themeStr}\n副詞：${useAdverb ? 'あり' : 'なし'}`);

  isLoading = true;
  document.getElementById('generateBtn').disabled = true;
  showTyping();

  const system = `あなたは明るく丁寧な英語教師のEmmaです。
【絶対ルール】
- 意味の解説・文法説明・ヒント・補足は、ユーザーから明示的に「説明して」「なぜ？」「理由を教えて」と言われるまで、一切行わない。
- 例文を出力するだけにとどめ、パターンの解説や気づきの誘導コメントも加えない。
- 最後の一言コメント（「どんなパターンに気づきましたか？」等）も禁止。
- 例文のみを淡々と出力すること。
返答はすべて日本語で行ってください。`;

  const prompt = `以下の単語それぞれについて、10個ずつ英語例文を作ってください。

単語リスト：${wordStr}
${themeStr}
${adverbStr}

## 出力フォーマット
各単語ごとにセクションを分けて、以下の形式で出力してください：

### [単語]

1. [英語例文] — [日本語訳]
（以下10個まで）

## 重要なルール
- 例文中の対象単語は **太字（**word**）** にしてください
- ${useAdverb ? '副詞も **太字** にしてください' : ''}
- テーマに沿った自然な文を作ること
- 各単語の特徴的な使い方が例文に表れるようにすること（意味の解説はしない）
- 最後に「どんなパターンに気づきましたか？」という短いメッセージをEmmaとして添えること`;

  try {
    const result = await callClaude([{ role: 'user', content: prompt }], system, 4000);
    hideTyping();
    if (result) {
      addEmmaMessage(formatSentencesHtml(result));
      conversationHistory.push({ role: 'user', content: prompt });
      conversationHistory.push({ role: 'assistant', content: result });
      document.getElementById('saveSessionBtn').disabled = false;
      setStep(2);
    }
  } catch(e) {
    hideTyping();
    addEmmaMessage('⚠️ エラーが発生しました：' + escapeHtml(e.message));
  } finally {
    isLoading = false;
    document.getElementById('generateBtn').disabled = false;
  }
}

function formatSentencesHtml(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/### (.+)/g, '<div class="word-header">$1</div>')
    .replace(/## .+/g, '')
    .replace(/\n\n+/g, '<br><br>')
    .replace(/\n(\d+\.)/g, '<br>$1');
}

// ─── Step 2 ───────────────────────────────────────────────────────────────────
async function sendStep2() {
  if (isLoading) return;
  const input = document.getElementById('step2Input');
  const text = input.value.trim();
  if (!text) return;
  addUserMessage(text);
  input.value = ''; input.style.height = '';
  isLoading = true;
  document.getElementById('step2SendBtn').disabled = true;
  showTyping();

  const system = `あなたは明るく丁寧な英語教師のEmmaです。
現在学習中の単語：${learnedWords.join(', ')}
${theme ? 'テーマ：' + theme : ''}
【絶対ルール】
- ユーザーが「説明して」「なぜ？」「理由は？」「文法を教えて」と明示的に求めるまで、意味・文法・ニュアンスの解説・ヒント・補足説明を一切しない。
- ユーザーの観察・気づき・仮説に対しては、例文の比較・提示のみで応じる。追加コメントや誘導は禁止。
- 説明を求められたときだけ、そのトピックに限定して詳しく答える。
返答はすべて日本語で。`;

  conversationHistory.push({ role: 'user', content: text });
  try {
    const result = await callClaude(conversationHistory, system, 1500);
    hideTyping();
    if (result) { addEmmaMessage(mdToHtml(result)); conversationHistory.push({ role: 'assistant', content: result }); }
  } catch(e) {
    hideTyping();
    addEmmaMessage('⚠️ エラー：' + escapeHtml(e.message));
    conversationHistory.pop();
  } finally {
    isLoading = false;
    document.getElementById('step2SendBtn').disabled = false;
  }
}

// ─── Step 3 ───────────────────────────────────────────────────────────────────
async function sendStep3() {
  if (isLoading) return;
  const input = document.getElementById('step3Input');
  const text = input.value.trim();
  if (!text) return;
  addUserMessage(text);
  input.value = ''; input.style.height = '';
  isLoading = true;
  document.getElementById('step3SendBtn').disabled = true;
  showTyping();

  const system = `あなたは明るく丁寧な英語教師のEmmaです。
現在学習中の単語：${learnedWords.join(', ')}
${theme ? 'テーマ：' + theme : ''}
【絶対ルール】
- ユーザーの日本語文を英訳し、使った単語が合っているか・間違っているかを一言だけ返す。
- 理由・解説・ヒント・補足は、ユーザーから「なぜ？」「理由は？」と聞かれるまで一切言わない。
- 返答は「英訳文」＋「○ / ✕ または △（惜しい）」の形式のみ。
返答はすべて日本語で。`;

  const prompt = `以下の日本語文を英訳してください。学習中の単語（${learnedWords.join(', ')}）の中から最も適切なものを選んで使ってください。英訳と、選んだ単語が適切かどうかの判定（○・△・✕）のみを返してください。理由は書かないこと。\n\n日本語：「${text}」`;
  conversationHistory.push({ role: 'user', content: prompt });
  try {
    const result = await callClaude(conversationHistory, system, 1000);
    hideTyping();
    if (result) { addEmmaMessage(mdToHtml(result)); conversationHistory.push({ role: 'assistant', content: result }); }
  } catch(e) {
    hideTyping();
    addEmmaMessage('⚠️ エラー：' + escapeHtml(e.message));
    conversationHistory.pop();
  } finally {
    isLoading = false;
    document.getElementById('step3SendBtn').disabled = false;
  }
}

// ─── Step 4 ───────────────────────────────────────────────────────────────────
async function requestSyntax() {
  if (isLoading) return;
  setStep(4);
  isLoading = true;
  showTyping();

  const system = `あなたは明るく丁寧な英語教師のEmmaです。英語の構文・文法を日本人学習者にわかりやすく解説します。返答はすべて日本語で。`;
  const prompt = `学習した単語（${learnedWords.join(', ')}）について、構文的な特徴と違いを比較してください。
- 各単語が目的語として何を取るか（名詞・that節・to不定詞など）
- 典型的な文型パターン
- 使われる文法的な文脈の違い
をまとめて説明してください。`;

  conversationHistory.push({ role: 'user', content: prompt });
  try {
    const result = await callClaude(conversationHistory, system, 1500);
    hideTyping();
    if (result) { addEmmaMessage(mdToHtml(result)); conversationHistory.push({ role: 'assistant', content: result }); }
  } catch(e) {
    hideTyping();
    addEmmaMessage('⚠️ エラー：' + escapeHtml(e.message));
    conversationHistory.pop();
  } finally {
    isLoading = false;
    document.getElementById('step2Panel').style.display = 'block';
    document.getElementById('step3Panel').style.display = 'none';
  }
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function mdToHtml(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/#{1,3} (.+)/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleChatKey(e, step) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (step === 'step2') sendStep2();
    else if (step === 'step3') sendStep3();
  }
}
function restart() {
  if (!confirm('最初からやり直しますか？')) return;
  conversationHistory = []; chatLog = []; learnedWords = []; theme = ''; useAdverb = false; isLoading = false;
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('wordsInput').value = '';
  document.getElementById('themeInput').value = '';
  document.getElementById('adverbCheck').checked = false;
  document.getElementById('step2Input').value = '';
  document.getElementById('step3Input').value = '';
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('saveSessionBtn').disabled = true;
  addEmmaMessage('こんにちは！わたしはEmmaです 🌿<br>英語の単語を一緒に深く学んでいきましょう。<br><br>まず、<strong>学びたい単語</strong>をスラッシュ区切りで入力して、テーマもあれば教えてください。');
  setStep(1);
}

// ─── Session: Save ────────────────────────────────────────────────────────────
function saveSession() {
  if (!learnedWords.length) return;
  const sessions = loadAllSessions();
  const now = new Date();
  const session = {
    id: now.getTime(),
    date: now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' }),
    time: now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }),
    words: learnedWords,
    theme,
    useAdverb,
    step: currentStep,
    conversationHistory: JSON.parse(JSON.stringify(conversationHistory)),
    chatLog: JSON.parse(JSON.stringify(chatLog))
  };
  // 同じ単語のセッションがあれば上書き、なければ先頭に追加
  const idx = sessions.findIndex(s => s.words.join('/') === learnedWords.join('/'));
  if (idx >= 0) sessions.splice(idx, 1);
  sessions.unshift(session);
  // 最大10件保持
  if (sessions.length > 10) sessions.pop();
  localStorage.setItem('emma_sessions', JSON.stringify(sessions));
  showToast('💾 セッションを保存しました');
}

// ─── Session: Load all ────────────────────────────────────────────────────────
function loadAllSessions() {
  try { return JSON.parse(localStorage.getItem('emma_sessions') || '[]'); }
  catch { return []; }
}

// ─── Session: Check on page load ─────────────────────────────────────────────
function checkForSavedSessions() {
  const sessions = loadAllSessions();
  if (sessions.length > 0) {
    const latest = sessions[0];
    document.getElementById('resumeWords').textContent = '📚 ' + latest.words.join(' / ');
    document.getElementById('resumeMeta').textContent =
      latest.date + ' ' + latest.time + (latest.theme ? '　テーマ：' + latest.theme : '') +
      (latest.useAdverb ? '　副詞あり' : '');
    document.getElementById('resumeModal').classList.add('open');
  } else {
    startFresh();
  }
}

function closeResumeModal() {
  document.getElementById('resumeModal').classList.remove('open');
  startFresh();
}

function startFresh() {
  addEmmaMessage(
    'こんにちは！わたしはEmmaです 🌿<br>英語の単語を一緒に深く学んでいきましょう。<br><br>まず、<strong>学びたい単語</strong>をスラッシュ区切りで入力して、テーマもあれば教えてください。準備ができたら「例文を生成する」ボタンを押してください！'
  );
  setStep(1);
}

// ─── Session: Resume ─────────────────────────────────────────────────────────
function resumeLatestSession() {
  const sessions = loadAllSessions();
  if (sessions.length === 0) return;
  document.getElementById('resumeModal').classList.remove('open');
  applySession(sessions[0]);
}

function applySession(session) {
  // Restore state
  learnedWords = session.words;
  theme = session.theme;
  useAdverb = session.useAdverb;
  conversationHistory = session.conversationHistory;
  chatLog = session.chatLog;

  // Restore inputs
  document.getElementById('wordsInput').value = session.words.join(' / ');
  document.getElementById('themeInput').value = session.theme || '';
  document.getElementById('adverbCheck').checked = session.useAdverb;

  // Restore chat visually (skip logging since already in chatLog)
  document.getElementById('chatMessages').innerHTML = '';
  for (const entry of session.chatLog) {
    appendMsg(createMsg(entry.role, entry.html));
  }
  addEmmaMessage('セッションを再開しました！引き続き一緒に学んでいきましょう 🌿', true);

  document.getElementById('saveSessionBtn').disabled = false;
  setStep(session.step || 2);
  closeHistoryModal();
}

// ─── Session: History modal ───────────────────────────────────────────────────
function openHistoryModal() {
  const sessions = loadAllSessions();
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  if (sessions.length === 0) {
    list.innerHTML = '<div class="history-empty">保存済みのセッションはありません</div>';
  } else {
    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'session-item';
      item.innerHTML = `
        <div class="session-words">📚 ${s.words.join(' / ')}</div>
        <div class="session-meta">${s.date} ${s.time}${s.theme ? '　テーマ：' + s.theme : ''}${s.useAdverb ? '　副詞あり' : ''}</div>
        <div class="session-btn-row">
          <button class="session-resume-btn" onclick="applySession(${JSON.stringify(s).replace(/"/g,'&quot;')})">再開</button>
          <button class="session-del-btn" onclick="deleteSession(${s.id})">削除</button>
        </div>`;
      list.appendChild(item);
    });
  }
  document.getElementById('historyModal').classList.add('open');
}

function closeHistoryModal() {
  document.getElementById('historyModal').classList.remove('open');
}

function deleteSession(id) {
  if (!confirm('このセッションを削除しますか？')) return;
  const sessions = loadAllSessions().filter(s => s.id !== id);
  localStorage.setItem('emma_sessions', JSON.stringify(sessions));
  openHistoryModal(); // refresh list
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
